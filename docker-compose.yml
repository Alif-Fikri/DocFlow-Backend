services:
  docflow-backend:
    build: .
    image: docflow-backend:latest
    container_name: docflow-backend
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      # Set a strong secret before exposing this service publicly.
      API_KEY: "${API_KEY:-changeme}"
      MAX_UPLOAD_MB: "50"
      CONVERT_TIMEOUT_SEC: "120"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/usr/local/bin/docflow-backend", "-healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
